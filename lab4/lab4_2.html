<!DOCTYPE html>
<html lang="ru">
<head>
		<meta charset="UTF-8">
		<title>Оформление вертикального меню</title>
		<link rel="stylesheet" href="fontawesome/css/all.css" />
		<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.4/css/all.min.css">
		<style>
			html {
				background: #f0f0f0;
			}
			
			.menu {
				width: 200px;
				background: #fff;
			}
			
			.menu ul {
					
			}
			
			.menu li {
					
			}
			
			.menu li a {
				color: #6188b0;
			}
			
			.menu li a:hover {
					
			}
			
			.menu li ul {
					
			}
			
			.menu li li {
					
			}
	</style>
</head>
<body>
	<nav class="menu">
		<ul>
			<li><div class="icon plus"></div><a href="#"> Фильмы</a>
				<ul>
					<li><div class="icon point"></div><a href="#">Экшн</a></li>
					<li><div class="icon point"></div><a href="#">Мелодрамы</a></li>
					<li><div class="icon point"></div><a href="#">Сериалы</a></li>
					<li><div class="icon point"></div><a href="#">Семейные</a></li>
				</ul>
			</li>
			<li><div class="icon plus"></div><a href="#">Музыка</a>
				<ul>
					<li><div class="icon point"></div><a href="#">Классика</a></li>
					<li><div class="icon point"></div><a href="#">Джаз</a></li>
					<li><div class="icon point"></div><a href="#">Рок</a></li>
					<li><div class="icon point"></div><a href="#">Грандж</a></li>
				</ul>
			</li>
			<li><div class="icon plus"></div><a href="#">Софт</a>
				<ul>
					<li><div class="icon point"></div><a href="#">Графика</a></li>
					<li><div class="icon point"></div><a href="#">3D-моделирование</a></li>
					<li><div class="icon point"></div><a href="#">Машинопись</a></li>
					<li><div class="icon point"></div><a href="#">Переводчики</a></li>
				</ul>
			</li>
			<li><div class="icon plus"></div><a href="#">Игры</a>
				<ul>
					<li><div class="icon point"></div><a href="#">РПГ</a></li>
					<li><div class="icon point"></div><a href="#">Шутеры</a></li>
					<li><div class="icon point"></div><a href="#">Пасьянсы</a></li>
				</ul>
			</li>
		</ul>
	</nav>
    <style>
        .icon::before {
            content: '';
            width: 16px;
            height: 16px;
            float: left;
            margin-right: 4px;
			font-family: "Font Awesome 5 Free";
        }
        .icon.point::before {
			content: '\f192';
            background-position: -16px -16px;
        }
        .icon.minus::before {
			content: '\f146';
            background-position: -16px -63px;
        }
		.icon.plus::before {
			content: '\f0fe';
            background-position: -16px -63px;
        }
        ul {
            list-style: none;
        }
		.menu ul li ul {
			display: none;
		}
		.menu ul li:hover ul {
			display: block;
		}
		.menu ul li:hover .icon.plus::before {
			content: '\f146';
            background-position: -16px -63px;
        }
    </style>
</body>
</html>
