<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Форма</title>
</head>
<body>
    <form method="POST">
        <h1>Форма регистрации пользователя</h1>
        <div><label for="email">Email</label>
        <input type="email" placeholder="Введите e-mail" name="email" id="email" required></div>
        <div><label for="password">Пароль</label>
        <input type="password" placeholder="Введите пароль" name="password" id="password" required></div>
        <div>
            <label for="">Пол</label>
            <input type="radio" name="gender" id="man">
            <label for="man">Мужчина</label>
            <input type="radio" name="gender" id="woman"> 
            <label for="woman">Женщина</label>
        </div>
        <div>
            <label for="">Год рождения</label>
            <select name="year" id="">
                <option value="1980">1980</option>
                <option value="1981">1981</option>
                <option value="1982">1982</option>
                <option value="1983">1983</option>
                <option value="1984">1984</option>
                <option value="1985">1985</option>
                <option value="1986">1986</option>
                <option value="1987">1987</option>
                <option value="1988">1988</option>
                <option value="1989">1989</option>
                <option value="1990">1990</option>
            </select>
            -й
        </div>
        <div>
            <div>

                <label for="">Я знаю</label>
            </div>
            <div>
                <input type="checkbox" name="know_russian" id="russian" checked disabled>
                <label for="russian">Русский</label>
            </div>
            <div>
                <input type="checkbox" name="know_spanish" id="spanish">
                <label for="spanish">Испанский</label>
            </div>
            <div>
                <input type="checkbox" name="know_german" id="german">
                <label for="german">Немецкий</label>
            </div>
            <div>
                <input type="checkbox" name="know_endlish" id="english">
                <label for="english">Английский</label>
            </div>
            <div>
                <input type="checkbox" name="know_chinese" id="chinese">
                <label for="chinese">Китайский</label>
            </div>
        </div>
        <div>
            <label for="Iknow">Я знаю</label>
            <textarea name="" id="Iknow" placeholder="Напишите коротко о себе"></textarea>
        </div>
        <span>
            <button type="submit">Готово</button>
            <button type="reset">Очистить</button>
        </span>
    </form>
</body>
</html>
